name: Daily LinkedIn Scraper

on:
  # Corre L-V a las 10:00am hora Ciudad de México (CDT = UTC-6 → 16:00 UTC)
  schedule:
    - cron: '0 16 * * 1-5'

  # También permite correrlo manualmente desde GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: 'dry-run o live'
        required: false
        default: 'live'

env:
  GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
  LINKEDIN_EMAIL:   ${{ secrets.LINKEDIN_EMAIL }}
  NVIDIA_API_KEY:   ${{ secrets.NVIDIA_API_KEY }}
  GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
  PROJECT_ROOT:     ${{ github.workspace }}

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 65   # scraper ~16m + FIT scores hasta 25m + margen

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_ci.txt

      # ── 3. Dependencias ──────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements_ci.txt

      - name: Install Playwright browsers (Firefox only)
        run: python -m playwright install firefox --with-deps

      # ── 4. Restaurar credenciales desde Secrets ──────────────────────────────
      # Usamos Python para escribir los JSON — evita errores de shell con
      # caracteres especiales como (, ), ', \ dentro del JSON
      - name: Write credentials from secrets
        env:
          LINKEDIN_AUTH_JSON:      ${{ secrets.LINKEDIN_AUTH_JSON }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON:       ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          mkdir -p data/credentials
          python3 - <<'PYEOF'
          import os
          files = {
              'data/credentials/linkedin_auth.json':  os.environ['LINKEDIN_AUTH_JSON'],
              'data/credentials/credentials.json':    os.environ['GOOGLE_CREDENTIALS_JSON'],
              'data/credentials/token.json':          os.environ['GOOGLE_TOKEN_JSON'],
          }
          for path, content in files.items():
              with open(path, 'w') as f:
                  f.write(content)
              print(f"Written: {path} ({len(content)} bytes)")
          PYEOF

      # ── 5. Correr el scraper ─────────────────────────────────────────────────
      - name: Run all scrapers (LinkedIn + Indeed + Computrabajo)
        run: python scripts/ci/run_scraper_ci.py
        env:
          SCRAPER_MODE: ${{ github.event.inputs.mode || 'live' }}
          DISPLAY: ':99'   # needed for some Playwright configurations

      # ── 6. Calcular FIT scores con IA ───────────────────────────────────────
      - name: Calculate FIT scores (Gemini → NVIDIA NIM fallback)
        run: python scripts/maintenance/calculate_linkedin_fit_scores.py
        timeout-minutes: 40

      # ── 7. Limpiar credenciales del runner (seguridad) ───────────────────────
      - name: Cleanup credentials
        if: always()
        run: |
          rm -f data/credentials/linkedin_auth.json
          rm -f data/credentials/credentials.json
          rm -f data/credentials/token.json
          echo "Credentials cleaned from runner"

      # ── 8. Notificación Telegram ─────────────────────────────────────────────
      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPER_MODE:       ${{ github.event.inputs.mode || 'live' }}
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, json, glob, re
          from datetime import datetime

          token   = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')
          mode    = os.environ.get('SCRAPER_MODE', 'live')

          if not token or not chat_id:
              print("⚠️  Telegram secrets no configurados — saltando notificación")
              exit(0)

          # Leer el log para sacar el conteo de jobs
          total = 0
          linkedin_count = 0
          indeed_count = 0
          computrabajo_count = 0
          logs = sorted(glob.glob('logs/scraper_*.log'))
          if logs:
              with open(logs[-1], encoding='utf-8', errors='ignore') as f:
                  for line in f:
                      m = re.search(r'TOTAL=(\d+)', line)
                      if m:
                          total = int(m.group(1))
                      ml = re.search(r'LinkedIn=(\d+)', line)
                      if ml:
                          linkedin_count = int(ml.group(1))
                      mi = re.search(r'Indeed=(\d+)', line)
                      if mi:
                          indeed_count = int(mi.group(1))
                      mc = re.search(r'Computrabajo=(\d+)', line)
                      if mc:
                          computrabajo_count = int(mc.group(1))

          today = datetime.utcnow().strftime('%d/%m/%Y')
          status = "✅ Éxito" if total > 0 else "⚠️ Sin resultados"

          msg = (
              f"🤖 <b>AI Job Foundry — {today}</b>\n"
              f"{status}\n\n"
              f"🔍 <b>{total}</b> jobs encontrados\n"
              f"  • LinkedIn: {linkedin_count}\n"
              f"  • Indeed: {indeed_count}\n"
              f"  • Computrabajo: {computrabajo_count}\n"
              f"📋 Modo: {mode.upper()}\n"
              f"📊 Revisa Google Sheets → pestañas LinkedIn / Indeed / Computrabajo\n\n"
              f"<i>Siguiente scraping: mañana 10am MX</i>"
          )

          url  = f"https://api.telegram.org/bot{token}/sendMessage"
          data = json.dumps({"chat_id": chat_id, "text": msg, "parse_mode": "HTML"}).encode()
          req  = urllib.request.Request(url, data=data,
                                        headers={"Content-Type": "application/json"})
          try:
              urllib.request.urlopen(req, timeout=10)
              print(f"✅ Telegram enviado: {total} jobs")
          except Exception as e:
              print(f"⚠️  Telegram error (no crítico): {e}")
          PYEOF

      # ── 8. Subir log como artifact (para diagnóstico) ────────────────────────
      - name: Upload scraper log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_number }}
          path: logs/scraper_*.log
          retention-days: 7
          if-no-files-found: ignore
