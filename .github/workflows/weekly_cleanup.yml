name: Weekly Job Cleanup

on:
  schedule:
    - cron: '0 14 * * 0'   # Sundays 8am Mexico CDT (UTC-6 → 14:00 UTC)
  workflow_dispatch:        # Manual trigger

env:
  GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
  PROJECT_ROOT:     ${{ github.workspace }}

jobs:
  cleanup:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_ci.txt
      - run: pip install -r requirements_ci.txt
      - name: Write credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON:       ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          mkdir -p data/credentials
          python3 - <<'PYEOF'
          import os
          files = {
              'data/credentials/credentials.json': os.environ['GOOGLE_CREDENTIALS_JSON'],
              'data/credentials/token.json':       os.environ['GOOGLE_TOKEN_JSON'],
          }
          for path, content in files.items():
              open(path, 'w').write(content)
              print(f"Written: {path}")
          PYEOF
      - name: Run cleanup
        run: python scripts/ci/run_cleanup_ci.py
      - name: Cleanup credentials
        if: always()
        run: rm -f data/credentials/credentials.json data/credentials/token.json
      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, urllib.request, json, glob, re
          from datetime import datetime
          token   = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')
          if not token or not chat_id:
              exit(0)
          deleted = 0
          logs = sorted(glob.glob('logs/cleanup_*.log'))
          if logs:
              with open(logs[-1], encoding='utf-8', errors='ignore') as f:
                  for line in f:
                      m = re.search(r'TOTAL ELIMINADAS:\s*(\d+)', line)
                      if m:
                          deleted = int(m.group(1))
          today = datetime.utcnow().strftime('%d/%m/%Y')
          msg = (f"🧹 <b>AI Job Foundry — Limpieza {today}</b>\n"
                 f"🗑️ <b>{deleted}</b> filas eliminadas\n"
                 f"<i>Próxima limpieza: domingo siguiente</i>")
          url  = f"https://api.telegram.org/bot{token}/sendMessage"
          data = json.dumps({"chat_id": chat_id, "text": msg, "parse_mode": "HTML"}).encode()
          req  = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json"})
          try:
              urllib.request.urlopen(req, timeout=10)
              print("Telegram sent")
          except Exception as e:
              print(f"Telegram error: {e}")
          PYEOF
      - name: Upload cleanup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-log-${{ github.run_number }}
          path: logs/cleanup_*.log
          retention-days: 7
          if-no-files-found: ignore
