<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chalan — Asistente IA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: #1a1a2e;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #2a2a4a;
  }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6c63ff, #3ecfcf);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; }
  header span { font-size: 0.75rem; color: #6c63ff; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e; margin-left: auto;
    box-shadow: 0 0 6px #22c55e;
  }
  #model-tag {
    font-size: 0.7rem; color: #888;
    margin-left: 4px;
    background: #222;
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* ── Chat area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .msg { display: flex; gap: 10px; max-width: 82%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.92rem;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: #6c63ff;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: #1e1e30;
    color: #ddd;
    border-bottom-left-radius: 4px;
    border: 1px solid #2a2a4a;
  }

  .msg-img {
    max-width: 260px;
    border-radius: 12px;
    cursor: pointer;
  }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6c63ff, #3ecfcf);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .typing { display: flex; gap: 5px; padding: 12px 16px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #6c63ff; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* ── Input bar ── */
  #input-bar {
    background: #161625;
    border-top: 1px solid #2a2a4a;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Image preview strip */
  #img-preview {
    display: none;
    gap: 8px;
    flex-wrap: wrap;
  }
  #img-preview.visible { display: flex; }
  .preview-thumb {
    position: relative;
    width: 60px; height: 60px;
  }
  .preview-thumb img {
    width: 60px; height: 60px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid #3a3a5a;
  }
  .preview-thumb button {
    position: absolute; top: -6px; right: -6px;
    background: #ff4444; color: #fff;
    border: none; border-radius: 50%;
    width: 18px; height: 18px;
    font-size: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* Row: text + buttons */
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #msg-input {
    flex: 1;
    background: #222235;
    border: 1px solid #3a3a5a;
    border-radius: 22px;
    padding: 10px 16px;
    color: #e8e8e8;
    font-size: 0.92rem;
    resize: none;
    max-height: 120px;
    outline: none;
    line-height: 1.4;
    transition: border-color .2s;
  }
  #msg-input:focus { border-color: #6c63ff; }
  #msg-input::placeholder { color: #555; }

  .icon-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: background .15s, transform .1s;
    flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(.93); }

  #btn-img   { background: #222235; color: #aaa; }
  #btn-img:hover { background: #2e2e4a; }

  #btn-voice { background: #222235; color: #aaa; }
  #btn-voice:hover  { background: #2e2e4a; }
  #btn-voice.recording { background: #ff4444; color: #fff; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(255,68,68,.4); } 50%{ box-shadow:0 0 0 10px rgba(255,68,68,0); } }

  #btn-send  { background: #6c63ff; color: #fff; }
  #btn-send:hover { background: #7c73ff; }
  #btn-send:disabled { background: #333; color: #666; cursor: default; }

  #voice-status {
    font-size: 0.75rem;
    color: #ff6666;
    text-align: center;
    display: none;
  }
  #voice-status.visible { display: block; }

  /* Hidden file input */
  #file-input { display: none; }

  /* ── Config panel ── */
  #cfg-toggle {
    font-size: 0.7rem; color: #555; cursor: pointer;
    text-align: right; user-select: none;
  }
  #cfg-toggle:hover { color: #888; }
  #cfg-panel {
    display: none;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 10px;
    padding: 12px 14px;
    gap: 10px;
    flex-direction: column;
  }
  #cfg-panel.open { display: flex; }
  #cfg-panel label { font-size: 0.75rem; color: #888; }
  #cfg-panel input, #cfg-panel select {
    width: 100%;
    background: #222235;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    padding: 6px 10px;
    color: #e8e8e8;
    font-size: 0.82rem;
    outline: none;
    margin-top: 2px;
  }
  .cfg-row { display: flex; gap: 10px; }
  .cfg-row > div { flex: 1; }
</style>
</head>
<body>

<header>
  <div class="avatar">🤖</div>
  <div>
    <h1>Chalan</h1>
    <span>Asistente IA personal</span>
  </div>
  <div class="status-dot" id="status-dot"></div>
  <div id="model-tag">LM Studio</div>
</header>

<div id="chat">
  <!-- Welcome message -->
  <div class="msg bot">
    <div class="msg-avatar">🤖</div>
    <div class="bubble">Hola! Soy Chalan. Puedes escribirme, mandarme una foto o grabar un audio. ¿En qué te ayudo?</div>
  </div>
</div>

<div id="input-bar">

  <!-- Config toggle -->
  <div id="cfg-toggle" onclick="toggleCfg()">⚙ Configuración</div>
  <div id="cfg-panel">
    <div class="cfg-row">
      <div>
        <label>API URL</label>
        <input id="cfg-url" value="http://192.168.100.39:11434/v1" placeholder="http://localhost:1234/v1">
      </div>
      <div>
        <label>Modelo</label>
        <input id="cfg-model" value="local-model" placeholder="local-model">
      </div>
    </div>
    <div>
      <label>Personalidad (system prompt)</label>
      <input id="cfg-system" value="Eres Chalan, un asistente amigable, directo y útil. Responde en español siempre que el usuario escriba en español.">
    </div>
  </div>

  <!-- Image preview strip -->
  <div id="img-preview"></div>

  <!-- Voice status -->
  <div id="voice-status">🎙 Grabando… (presiona detener cuando termines)</div>

  <!-- Input row -->
  <div class="input-row">
    <input type="file" id="file-input" accept="image/*" multiple>
    <button class="icon-btn" id="btn-img"   title="Adjuntar imagen"  onclick="document.getElementById('file-input').click()">📎</button>
    <textarea  id="msg-input" rows="1" placeholder="Escribe un mensaje…"
               oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="icon-btn" id="btn-voice" title="Grabar audio"     onclick="toggleVoice()">🎙</button>
    <button class="icon-btn" id="btn-send"  title="Enviar"           onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let pendingImages = [];   // [{dataUrl, base64, mime}]
let mediaRecorder = null;
let audioChunks  = [];
let isRecording  = false;
let conversationHistory = [];

// ── Config helpers ────────────────────────────────────────────────────────────
function cfg() {
  return {
    url:    document.getElementById('cfg-url').value.trim().replace(/\/$/, ''),
    model:  document.getElementById('cfg-model').value.trim() || 'local-model',
    system: document.getElementById('cfg-system').value.trim(),
  };
}
function toggleCfg() {
  document.getElementById('cfg-panel').classList.toggle('open');
}

// ── Auto-resize textarea ──────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ── Image attachment ──────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', function() {
  const files = Array.from(this.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      const base64  = dataUrl.split(',')[1];
      const mime    = file.type;
      pendingImages.push({ dataUrl, base64, mime, name: file.name });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  this.value = '';
});

function renderPreviews() {
  const strip = document.getElementById('img-preview');
  strip.innerHTML = '';
  pendingImages.forEach((img, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'preview-thumb';
    wrap.innerHTML = `<img src="${img.dataUrl}">
      <button onclick="removeImage(${i})">×</button>`;
    strip.appendChild(wrap);
  });
  strip.classList.toggle('visible', pendingImages.length > 0);
}
function removeImage(i) {
  pendingImages.splice(i, 1);
  renderPreviews();
}

// ── Voice recording ───────────────────────────────────────────────────────────
async function toggleVoice() {
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks   = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = processAudio;
      mediaRecorder.start();
      isRecording = true;
      document.getElementById('btn-voice').classList.add('recording');
      document.getElementById('btn-voice').title = 'Detener grabación';
      document.getElementById('btn-voice').textContent = '⏹';
      document.getElementById('voice-status').classList.add('visible');
    } catch(err) {
      alert('No se pudo acceder al micrófono: ' + err.message);
    }
  } else {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    isRecording = false;
    document.getElementById('btn-voice').classList.remove('recording');
    document.getElementById('btn-voice').title = 'Grabar audio';
    document.getElementById('btn-voice').textContent = '🎙';
    document.getElementById('voice-status').classList.remove('visible');
  }
}

function processAudio() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  // Use Web Speech API for transcription (browser-native, no server needed)
  // Fallback: show a message that audio was received but transcription needs Chrome
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    appendMessage('user', '🎙 [Audio grabado — requiere Chrome para transcripción automática]');
    return;
  }
  // Replay via audio element to trigger speech recognition
  // Better: use SpeechRecognition directly on the stream (Chrome only)
  alert('Audio grabado. Para transcripción automática usa el botón 🎙 en Chrome y habla directamente — el browser transcribe en tiempo real.');
}

// ── Better voice: real-time Web Speech API ────────────────────────────────────
// Replace the mic button behavior with live SpeechRecognition when available
(function setupLiveSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;  // not supported, keep MediaRecorder fallback

  const recognition = new SR();
  recognition.lang = 'es-MX';
  recognition.continuous = false;
  recognition.interimResults = true;

  let liveFinal = '';

  recognition.onstart = () => {
    isRecording = true;
    liveFinal = '';
    document.getElementById('btn-voice').classList.add('recording');
    document.getElementById('btn-voice').textContent = '⏹';
    document.getElementById('voice-status').classList.add('visible');
    document.getElementById('voice-status').textContent = '🎙 Escuchando… (habla ahora)';
  };
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) liveFinal += e.results[i][0].transcript;
      else interim = e.results[i][0].transcript;
    }
    document.getElementById('msg-input').value = liveFinal + interim;
    autoResize(document.getElementById('msg-input'));
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('btn-voice').classList.remove('recording');
    document.getElementById('btn-voice').textContent = '🎙';
    document.getElementById('voice-status').classList.remove('visible');
    // Auto-send if something was captured
    if (liveFinal.trim()) sendMessage();
  };
  recognition.onerror = (e) => {
    isRecording = false;
    document.getElementById('btn-voice').classList.remove('recording');
    document.getElementById('btn-voice').textContent = '🎙';
    document.getElementById('voice-status').classList.remove('visible');
  };

  // Override toggleVoice to use live recognition
  window.toggleVoice = function() {
    if (!isRecording) recognition.start();
    else              recognition.stop();
  };
})();

// ── Chat rendering ────────────────────────────────────────────────────────────
function appendMessage(role, text, images = []) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  if (role === 'bot') {
    wrap.innerHTML = `<div class="msg-avatar">🤖</div>`;
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (images.length) {
    images.forEach(img => {
      const el = document.createElement('img');
      el.src = img.dataUrl;
      el.className = 'msg-img';
      el.onclick = () => window.open(img.dataUrl);
      bubble.appendChild(el);
    });
    if (text) bubble.appendChild(document.createTextNode('\n' + text));
  } else {
    bubble.textContent = text;
  }

  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `<div class="msg-avatar">🤖</div>
    <div class="bubble typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  const input   = document.getElementById('msg-input');
  const text    = input.value.trim();
  const images  = [...pendingImages];

  if (!text && images.length === 0) return;

  // Render user bubble
  appendMessage('user', text, images);

  // Clear input
  input.value = '';
  input.style.height = 'auto';
  pendingImages = [];
  renderPreviews();

  // Build message content for API
  let userContent;
  if (images.length > 0) {
    userContent = [];
    if (text) userContent.push({ type: 'text', text });
    images.forEach(img => {
      userContent.push({
        type: 'image_url',
        image_url: { url: `data:${img.mime};base64,${img.base64}` }
      });
    });
  } else {
    userContent = text;
  }

  conversationHistory.push({ role: 'user', content: userContent });

  // Show typing
  showTyping();
  document.getElementById('btn-send').disabled = true;

  try {
    const { url, model, system } = cfg();
    const messages = [
      { role: 'system', content: system },
      ...conversationHistory
    ];

    const res = await fetch(`${url}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, messages, stream: true, temperature: 0.7 })
    });

    if (!res.ok) throw new Error(`Error ${res.status}: ${await res.text()}`);

    hideTyping();
    const botBubble = appendMessage('bot', '');
    let botText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
      for (const line of lines) {
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || '';
          botText += delta;
          botBubble.textContent = botText;
          document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        } catch {}
      }
    }

    conversationHistory.push({ role: 'assistant', content: botText });
    document.getElementById('status-dot').style.background = '#22c55e';

  } catch (err) {
    hideTyping();
    appendMessage('bot', `⚠ No pude conectar con el modelo.\n${err.message}\n\nVerifica que LM Studio esté corriendo y la URL en ⚙ Configuración sea correcta.`);
    document.getElementById('status-dot').style.background = '#ef4444';
  }

  document.getElementById('btn-send').disabled = false;
}

// ── On load: test connection ──────────────────────────────────────────────────
window.addEventListener('load', async () => {
  const { url, model } = cfg();
  document.getElementById('model-tag').textContent = model;
  try {
    const r = await fetch(`${url}/models`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      const data = await r.json();
      const models = data.data?.map(m => m.id) || [];
      document.getElementById('model-tag').textContent = models[0] || model;
      document.getElementById('status-dot').style.background = '#22c55e';
    }
  } catch {
    document.getElementById('status-dot').style.background = '#ef4444';
    document.getElementById('model-tag').textContent = 'sin conexión';
  }
});
</script>
</body>
</html>
